<!-- templates/hero.html -->
{% load static %}

<section class="hero-section d-flex align-items-center text-light">
  <div class="container">
    <div class="row justify-content-center text-center">

      <div class="col-lg-8">

        <!-- Badge -->
        <span class="badge bg-primary px-3 py-2 mb-3">
          Full-Stack Web Developer
        </span>

        <!-- Headline -->
        <h1 class="display-3 fw-bold mt-3">
          Building scalable<br>
          <span class="text-gradient">
            modern web applications
          </span>
        </h1>

        <!-- Subtext -->
        <p class="lead mt-4 text-light opacity-75">
          I design and develop clean, high-performance applications using
          Python, Django, and modern frontend technologies.
        </p>

        <!-- Tech Stack -->
        <div class="d-flex flex-wrap justify-content-center gap-3 mt-4">
          <span class="badge bg-secondary">Python</span>
          <span class="badge bg-secondary">Django</span>
          <span class="badge bg-secondary">PostgreSQL</span>
          <span class="badge bg-secondary">Bootstrap</span>
          <span class="badge bg-secondary">Docker</span>
          <span class="badge bg-secondary">GCP</span>
        </div>

        <!-- CTA -->
        <div class="d-flex flex-column flex-sm-row gap-3 mt-5 justify-content-center">
          <a href="{% url 'projects' %}" class="btn btn-primary btn-lg px-5">
            View Projects
          </a>
          <a href="{% url 'contact' %}" class="btn btn-outline-light btn-lg px-5">
            Contact Me
          </a>
        </div>

      </div>

    </div>
  </div>
</section>
